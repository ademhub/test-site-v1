<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — MyShop</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="checkout">

<header class="site-header">
  <div class="container header-inner">
    <a href="index.html" class="logo">MyShop</a>
    <div class="header-actions">
      <a href="cart.html" class="cart-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        Cart <span class="cart-count hidden">0</span>
      </a>
    </div>
  </div>
</header>

<div class="page-hero">
  <div class="container">
    <h1>Checkout</h1>
    <p>Complete your order below.</p>
  </div>
</div>

<section>
  <div class="container" id="checkout-content">
    <div class="checkout-layout">

      <!-- Left: Form -->
      <div class="checkout-form-area">

        <!-- Steps -->
        <div class="progress-steps">
          <div class="step done">
            <div class="step-circle">✓</div>
            <span class="step-label">Cart</span>
          </div>
          <div class="step-line"></div>
          <div class="step active">
            <div class="step-circle">2</div>
            <span class="step-label">Shipping</span>
          </div>
          <div class="step-line"></div>
          <div class="step">
            <div class="step-circle">3</div>
            <span class="step-label">Payment</span>
          </div>
          <div class="step-line"></div>
          <div class="step">
            <div class="step-circle">4</div>
            <span class="step-label">Confirm</span>
          </div>
        </div>

        <form id="checkout-form">

          <!-- Shipping info -->
          <div class="form-card">
            <h3>📦 Shipping Information</h3>
            <div class="form-grid">
              <div class="form-group">
                <label>First name</label>
                <input type="text" placeholder="John" required>
              </div>
              <div class="form-group">
                <label>Last name</label>
                <input type="text" placeholder="Doe" required>
              </div>
              <div class="form-group form-full">
                <label>Email address</label>
                <input type="email" placeholder="john@example.com" required>
              </div>
              <div class="form-group form-full">
                <label>Street address</label>
                <input type="text" placeholder="123 Main Street" required>
              </div>
              <div class="form-group">
                <label>City</label>
                <input type="text" placeholder="New York" required>
              </div>
              <div class="form-group">
                <label>ZIP code</label>
                <input type="text" placeholder="10001" required>
              </div>
              <div class="form-group form-full">
                <label>Country</label>
                <select>
                  <option>United States</option>
                  <option>Canada</option>
                  <option>United Kingdom</option>
                  <option>France</option>
                  <option>Germany</option>
                  <option>Australia</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Payment -->
          <div class="form-card">
            <h3>💳 Payment Method</h3>
            <div class="payment-methods">
              <label class="payment-option selected">
                <input type="radio" name="payment" value="card" checked>
                <span class="pay-emoji">💳</span>
                <div>
                  <p class="pay-label">Credit / Debit Card</p>
                  <p class="pay-sub">Visa, Mastercard, Amex</p>
                </div>
              </label>
              <label class="payment-option">
                <input type="radio" name="payment" value="paypal">
                <span class="pay-emoji">🅿️</span>
                <div>
                  <p class="pay-label">PayPal</p>
                  <p class="pay-sub">Pay securely with PayPal</p>
                </div>
              </label>
              <label class="payment-option">
                <input type="radio" name="payment" value="apple">
                <span class="pay-emoji">🍎</span>
                <div>
                  <p class="pay-label">Apple Pay</p>
                  <p class="pay-sub">Touch ID or Face ID</p>
                </div>
              </label>
            </div>
            <div class="form-grid">
              <div class="form-group form-full">
                <label>Card number</label>
                <input type="text" placeholder="1234 5678 9012 3456" maxlength="19">
              </div>
              <div class="form-group">
                <label>Expiry</label>
                <input type="text" placeholder="MM / YY" maxlength="7">
              </div>
              <div class="form-group">
                <label>CVV</label>
                <input type="text" placeholder="•••" maxlength="4">
              </div>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-lg btn-block">
            🔒 Place order
          </button>
          <p style="text-align:center;font-size:.8125rem;color:var(--text-muted);margin-top:10px">
            Your payment information is encrypted and secure.
          </p>
        </form>
      </div>

      <!-- Right: Order summary -->
      <div id="checkout-summary" class="order-summary"></div>

    </div>
  </div>
</section>

<footer class="site-footer">
  <div class="container footer-bottom">
    <p>&copy; 2025 MyShop. All rights reserved.</p>
    <p><a href="cart.html" style="color:rgba(255,255,255,.5)">← Back to cart</a></p>
  </div>
</footer>

<script src="assets/js/main.js"></script>
</body>
</html>
