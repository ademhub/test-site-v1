<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop — MyShop</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="shop">

<header class="site-header">
  <div class="container header-inner">
    <a href="index.html" class="logo">MyShop</a>
    <nav class="nav">
      <a href="index.html" class="nav-link">Home</a>
      <a href="shop.html" class="nav-link active">Shop</a>
      <a href="account.html" class="nav-link">Account</a>
    </nav>
    <div class="header-actions">
      <a href="cart.html" class="cart-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        Cart <span class="cart-count hidden">0</span>
      </a>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </div>
  <nav class="mobile-nav" id="mobile-nav">
    <a href="index.html" class="nav-link">Home</a>
    <a href="shop.html" class="nav-link">Shop</a>
    <a href="account.html" class="nav-link">Account</a>
    <a href="cart.html" class="nav-link">Cart</a>
  </nav>
</header>

<div class="page-hero">
  <div class="container">
    <h1>All Products</h1>
    <p>Browse our full collection — from electronics to home goods.</p>
  </div>
</div>

<section>
  <div class="container">

    <!-- Filters -->
    <div class="filters-bar">
      <span class="label">Filter:</span>
      <button class="filter-chip active" data-cat="All">All</button>
      <button class="filter-chip" data-cat="Electronics">Electronics</button>
      <button class="filter-chip" data-cat="Home">Home</button>
      <button class="filter-chip" data-cat="Stationery">Stationery</button>
      <button class="filter-chip" data-cat="Accessories">Accessories</button>
    </div>

    <!-- Toolbar -->
    <div class="shop-toolbar">
      <p class="results-count" id="results-count"></p>
      <div class="search-bar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="search-input" type="text" placeholder="Search products…">
      </div>
    </div>

    <!-- Grid -->
    <div class="products-grid" id="products-grid"></div>

  </div>
</section>

<footer class="site-footer">
  <div class="container footer-bottom">
    <p>&copy; 2025 MyShop. All rights reserved.</p>
    <p><a href="index.html" style="color:rgba(255,255,255,.5)">← Back to home</a></p>
  </div>
</footer>

<script src="assets/js/main.js"></script>
</body>
</html>
